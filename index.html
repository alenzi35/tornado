<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Tornado Probability</title>

<style>
body{
margin:0;
overflow:hidden;
background:#000;
font-family:Arial,Helvetica,sans-serif;
}

#tooltip{
position:absolute;
display:none;
background:rgba(0,0,0,0.85);
color:white;
padding:8px;
border-radius:4px;
font-size:12px;
pointer-events:none;
line-height:1.4;
}
</style>
</head>

<body>

<canvas id="map"></canvas>
<div id="tooltip"></div>

<script>

const canvas = document.getElementById("map")
const ctx = canvas.getContext("2d")
const tooltip = document.getElementById("tooltip")

function resize(){
canvas.width = window.innerWidth
canvas.height = window.innerHeight
draw()
}

window.addEventListener("resize",resize)
resize()

let cells=[]
let borders=[]

let scale=1
let offsetX=0
let offsetY=0

// =========================
// Projection helpers
// =========================

function lccToScreen(x,y){
return{
x:(x+offsetX)*scale + canvas.width/2,
y:(-y+offsetY)*scale + canvas.height/2
}
}

function screenToLCC(px,py){
return{
x:(px-canvas.width/2)/scale-offsetX,
y:-(py-canvas.height/2)/scale-offsetY
}
}

// =========================
// Draw function
// =========================

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

for(const c of cells){

const p=lccToScreen(c.x,c.y)

const w=c.dx*scale
const h=c.dy*scale

const prob=c.prob

if(prob<=0) continue

const r=Math.min(255,prob*4000)
const g=0
const b=0

ctx.fillStyle=`rgb(${r},${g},${b})`

ctx.fillRect(p.x,p.y,w,h)

}

ctx.strokeStyle="white"
ctx.lineWidth=1

for(const line of borders){

ctx.beginPath()

for(let i=0;i<line.length;i++){

const p=lccToScreen(line[i][0],line[i][1])

if(i===0) ctx.moveTo(p.x,p.y)
else ctx.lineTo(p.x,p.y)

}

ctx.stroke()

}

}

// =========================
// Zoom
// =========================

canvas.addEventListener("wheel",e=>{

e.preventDefault()

const zoom=e.deltaY<0?1.15:0.85

const mouse=screenToLCC(e.offsetX,e.offsetY)

scale*=zoom

offsetX=mouse.x-(mouse.x-offsetX)*zoom
offsetY=mouse.y-(mouse.y-offsetY)*zoom

draw()

})

// =========================
// Pan
// =========================

let dragging=false
let lastX=0
let lastY=0

canvas.addEventListener("mousedown",e=>{
dragging=true
lastX=e.clientX
lastY=e.clientY
})

canvas.addEventListener("mouseup",()=>dragging=false)
canvas.addEventListener("mouseleave",()=>dragging=false)

canvas.addEventListener("mousemove",e=>{

if(dragging){

offsetX+=(e.clientX-lastX)/scale
offsetY-=(e.clientY-lastY)/scale

lastX=e.clientX
lastY=e.clientY

draw()

}

// =========================
// Tooltip detection
// =========================

const {x,y}=screenToLCC(e.offsetX,e.offsetY)

let hit=null

for(const c of cells){

if(x>=c.x && x<=c.x+c.dx && y>=c.y && y<=c.y+c.dy){
hit=c
break
}

}

if(hit){

tooltip.style.display="block"
tooltip.style.left=(e.pageX+12)+"px"
tooltip.style.top=(e.pageY+12)+"px"

let html=`Probability: ${(hit.prob*100).toFixed(4)}%`

if(hit.cape!==undefined)
html+=`<br>CAPE: ${hit.cape.toFixed(0)} J/kg`

if(hit.cin!==undefined)
html+=`<br>CIN: ${hit.cin.toFixed(0)} J/kg`

if(hit.helicity!==undefined)
html+=`<br>SRH: ${hit.helicity.toFixed(0)} m²/s²`

if(hit.lcl!==undefined)
html+=`<br>LCL: ${hit.lcl.toFixed(0)} m`

if(hit.shear!==undefined)
html+=`<br>Shear: ${hit.shear.toFixed(0)} kt`

tooltip.innerHTML=html

}else{

tooltip.style.display="none"

}

})

// =========================
// Load data
// =========================

fetch("tornado_prob_lcc.json")
.then(r=>r.json())
.then(d=>{
cells=d
draw()
})

fetch("borders_lcc.json")
.then(r=>r.json())
.then(d=>{
borders=d
draw()
})

</script>

</body>
</html>
